name: Build iOS unsigned IPA

on:
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest

    env:
      GODOT_VERSION: "4.7"
      EXPORT_PRESET: "iOS"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Godot and export templates
        run: |
          set -e
          BASE="https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable"

          curl -L -o godot.zip "${BASE}/Godot_v${GODOT_VERSION}-stable_macos.universal.zip"
          unzip -q godot.zip

          GODOT_BIN="$(pwd)/Godot.app/Contents/MacOS/Godot"
          echo "GODOT_BIN=$GODOT_BIN" >> "$GITHUB_ENV"

          curl -L -o templates.tpz "${BASE}/Godot_v${GODOT_VERSION}-stable_export_templates.tpz"
          unzip -q templates.tpz

          TEMPLATE_DIR="$HOME/Library/Application Support/Godot/export_templates/${GODOT_VERSION}.stable"
          mkdir -p "$TEMPLATE_DIR"
          mv templates/* "$TEMPLATE_DIR"/

      - name: Import Godot assets
        run: |
          "$GODOT_BIN" --headless --path . --import || true

      - name: Export iOS Xcode project ZIP
        run: |
          set -e
          mkdir -p build/ios
          "$GODOT_BIN" --headless --path . --export-release "$EXPORT_PRESET" build/ios/ios_project.zip

      - name: Unzip Xcode project
        run: |
          set -e
          mkdir -p build/ios/unzipped
          unzip -q build/ios/ios_project.zip -d build/ios/unzipped
          find build/ios/unzipped -name "*.xcodeproj"

      - name: Build unsigned app
        run: |
          set -e

          XCODEPROJ="$(find build/ios/unzipped -name '*.xcodeproj' | head -n 1)"
          SCHEME="$(xcodebuild -list -json -project "$XCODEPROJ" | python3 -c 'import sys,json; print(json.load(sys.stdin)["project"]["schemes"][0])')"

          echo "Project: $XCODEPROJ"
          echo "Scheme: $SCHEME"

          mkdir -p build/ios/app

          xcodebuild \
            -project "$XCODEPROJ" \
            -scheme "$SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            CONFIGURATION_BUILD_DIR="$PWD/build/ios/app" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            build

      - name: Package unsigned IPA
        run: |
          set -e
          APP_PATH="$(find build/ios/app -name '*.app' | head -n 1)"
          mkdir -p Payload
          cp -R "$APP_PATH" Payload/
          zip -qr GodotTouchDemo-unsigned.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: ios-unsigned-ipa
          path: GodotTouchDemo-unsigned.ipa